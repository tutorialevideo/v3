version: '3.8'

# Docker Compose optimized for 24 CPU cores and 64GB RAM
# Usage: docker-compose -f docker-compose.production.yml up -d

services:
  # PostgreSQL Database - Optimized for high performance
  postgres:
    image: postgres:15-alpine
    container_name: just_postgres
    environment:
      POSTGRES_USER: justapp
      POSTGRES_PASSWORD: justapp123
      POSTGRES_DB: justportal
      # Performance tuning for 64GB RAM
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d
    ports:
      - "5433:5432"
    command: >
      postgres
      -c shared_buffers=8GB
      -c effective_cache_size=24GB
      -c maintenance_work_mem=2GB
      -c checkpoint_completion_target=0.9
      -c wal_buffers=64MB
      -c default_statistics_target=100
      -c random_page_cost=1.1
      -c effective_io_concurrency=200
      -c work_mem=256MB
      -c min_wal_size=1GB
      -c max_wal_size=4GB
      -c max_worker_processes=12
      -c max_parallel_workers_per_gather=4
      -c max_parallel_workers=12
      -c max_parallel_maintenance_workers=4
      -c max_connections=200
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U justapp -d justportal"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '8'
          memory: 32G
        reservations:
          cpus: '4'
          memory: 16G

  # MongoDB Database - Optimized
  mongodb:
    image: mongo:6-jammy
    container_name: just_mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: rootpassword
    volumes:
      - mongodb_data:/data/db
    ports:
      - "27018:27017"
    command: >
      mongod
      --wiredTigerCacheSizeGB 4
      --storageEngine wiredTiger
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 8G
        reservations:
          cpus: '2'
          memory: 4G

  # FastAPI Backend - Multi-worker with Gunicorn
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.production
    container_name: just_backend
    environment:
      - MONGO_URL=mongodb://root:rootpassword@mongodb:27017/
      - DB_NAME=justportal
      - POSTGRES_URL=postgresql://justapp:justapp123@postgres:5432/justportal
      - CORS_ORIGINS=*
      - WORKERS=8
      - THREADS_PER_WORKER=2
    volumes:
      - backend_downloads:/app/downloads
    ports:
      - "8001:8001"
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/api/"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '10'
          memory: 16G
        reservations:
          cpus: '4'
          memory: 8G

  # React Frontend - with Nginx caching
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - REACT_APP_BACKEND_URL=http://localhost:8001
    container_name: just_frontend
    ports:
      - "3080:80"
    depends_on:
      - backend
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 1G

volumes:
  postgres_data:
  mongodb_data:
  backend_downloads:
