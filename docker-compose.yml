services:
  # MongoDB — singura baza de date (firme, dosare, bilanturi + config)
  mongodb:
    image: mongo:6-jammy
    container_name: just_mongodb
    env_file: .env
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
    volumes:
      - mongodb_data:/data/db
    ports:
      - "27018:27017"
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # FastAPI Backend — MongoDB only, PostgreSQL optional (Supabase sync)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: just_backend
    env_file: .env
    environment:
      - MONGO_URL=mongodb://${MONGO_ROOT_USER}:${MONGO_ROOT_PASSWORD}@mongodb:27017/
      - DB_NAME=justportal
      - SUPABASE_URL=${SUPABASE_URL}
      - CORS_ORIGINS=*
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - EMERGENT_LLM_KEY=${EMERGENT_LLM_KEY}
      - BPI_INPUT_DIR=/app/bpi_input
      - MFIRME_URL=${MFIRME_URL}
      - MFIRME_USER=${MFIRME_USER}
      - MFIRME_PASS=${MFIRME_PASS}
    volumes:
      - backend_downloads:/app/downloads
      - ./bpi_input:/app/bpi_input
    ports:
      - "8001:8001"
    depends_on:
      mongodb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/api/"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # React Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - REACT_APP_BACKEND_URL=http://localhost:8001
    container_name: just_frontend
    ports:
      - "3080:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  mongodb_data:
  backend_downloads:
