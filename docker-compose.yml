services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: just_postgres
    shm_size: '4g'
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    command: >
      postgres
      -c shared_buffers=4GB
      -c effective_cache_size=48GB
      -c maintenance_work_mem=2GB
      -c work_mem=64MB
      -c max_connections=200
      -c checkpoint_completion_target=0.9
      -c wal_buffers=64MB
      -c random_page_cost=1.1
      -c max_worker_processes=24
      -c max_parallel_workers_per_gather=8
      -c max_parallel_workers=16
      -c synchronous_commit=off
      -c autovacuum_vacuum_cost_delay=2ms
      -c autovacuum_vacuum_scale_factor=0.01
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U justapp -d justportal"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # MongoDB Database
  mongodb:
    image: mongo:6-jammy
    container_name: just_mongodb
    env_file: .env
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
    volumes:
      - mongodb_data:/data/db
    ports:
      - "27018:27017"  # Changed to 27018 to avoid conflicts
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: just_backend
    env_file: .env
    environment:
      - MONGO_URL=mongodb://${MONGO_ROOT_USER}:${MONGO_ROOT_PASSWORD}@mongodb:27017/
      - DB_NAME=${POSTGRES_DB}
      - POSTGRES_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - CORS_ORIGINS=*
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - EMERGENT_LLM_KEY=${EMERGENT_LLM_KEY}
      - BPI_INPUT_DIR=/app/bpi_input
    volumes:
      - backend_downloads:/app/downloads
      # Mount your local BPI PDF folder here — edit the left side to your path
      # Example: /home/adrian/bpi_pdfs:/app/bpi_input
      - ./bpi_input:/app/bpi_input
    ports:
      - "8001:8001"
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/api/"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # React Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - REACT_APP_BACKEND_URL=http://localhost:8001
    container_name: just_frontend
    ports:
      - "3080:80"  # Changed to 3080 to avoid conflicts with port 3000
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  mongodb_data:
  backend_downloads:
