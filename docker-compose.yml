services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: just_postgres
    shm_size: '4g'
    environment:
      POSTGRES_USER: justapp
      POSTGRES_PASSWORD: justapp123
      POSTGRES_DB: justportal
    command: >
      postgres
      -c shared_buffers=4GB
      -c effective_cache_size=48GB
      -c maintenance_work_mem=2GB
      -c work_mem=64MB
      -c max_connections=200
      -c checkpoint_completion_target=0.9
      -c wal_buffers=64MB
      -c random_page_cost=1.1
      -c max_worker_processes=24
      -c max_parallel_workers_per_gather=8
      -c max_parallel_workers=16
      -c synchronous_commit=off
      -c autovacuum_vacuum_cost_delay=2ms
      -c autovacuum_vacuum_scale_factor=0.01
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U justapp -d justportal"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # MongoDB Database
  mongodb:
    image: mongo:6-jammy
    container_name: just_mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: rootpassword
    volumes:
      - mongodb_data:/data/db
    ports:
      - "27018:27017"  # Changed to 27018 to avoid conflicts
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: just_backend
    environment:
      - MONGO_URL=mongodb://root:rootpassword@mongodb:27017/
      - DB_NAME=justportal
      - POSTGRES_URL=postgresql://justapp:justapp123@postgres:5432/justportal
      - CORS_ORIGINS=*
      - EMERGENT_LLM_KEY=sk-emergent-2988e1114097c4908F
      - GEMINI_API_KEY=AIzaSyDpeicr5gnNo1Rg_GraVfTYyfHLG3f41TE
    volumes:
      - backend_downloads:/app/downloads
    ports:
      - "8001:8001"
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/api/"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # React Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - REACT_APP_BACKEND_URL=http://localhost:8001
    container_name: just_frontend
    ports:
      - "3080:80"  # Changed to 3080 to avoid conflicts with port 3000
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  mongodb_data:
  backend_downloads:
